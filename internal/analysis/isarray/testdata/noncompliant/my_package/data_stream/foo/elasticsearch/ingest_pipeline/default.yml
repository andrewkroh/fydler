---
description: Pipeline for processing foo events.
processors:
  - set:
      field: ecs.version
      value: '8.9.0'
  - append:
      field: host.name
      value: '{{json.hostname}}'
  - append:
      field: related.ip
      value: '{{source.ip}}'
      allow_duplicates: false
on_failure:
  - append:
      field: error.message
      value: '{{_ingest.on_failure_message}}'
